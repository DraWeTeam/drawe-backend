services:
  backend:
    build: .
    ports:
      - "8080:8080"
    networks:
      - app-network
    depends_on:
      drawe_db:
        condition: service_healthy

  drawe_db:
    image: mysql:8
    ports:
      - "3309:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=drawe_db
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p$MYSQL_ROOT_PASSWORD"]
      interval: 5s
      retries: 10

volumes:
  mysql-data:

networks:
  app-network:
    external: true